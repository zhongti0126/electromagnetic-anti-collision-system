<!DOCTYPE html>
<html>

<head>
    <title>IoT Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding-top: 50px;
            margin-left: 220px;
        }

        .card {
            background: #1e293b;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        .warning {
            color: #ff4d4d;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .safe {
            color: #22c55e;
            font-weight: bold;
        }

        .sidebar {

    position: fixed;

    left: 0;

    top: 0;

    width: 220px;

    height: 100%;

    background: #020617;

    padding-top: 30px;

    color: white;
}

.sidebar h2 {

    margin-bottom: 40px;
}

.sidebar ul {

    list-style: none;

    padding: 0;
}

.sidebar li {

    padding: 15px;

    cursor: pointer;

    transition: 0.3s;
}

.sidebar li:hover {

    background: #1e293b;
}
        
        canvas {
            margin-top: 30px;
            margin: 30px auto;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

    <div class="sidebar">

    <h2>🚗 IoT Panel</h2>

    <ul>
        <li>Dashboard</li>
        <li>Sensors</li>
        <li>Analytics</li>
        <li>System Status</li>
    </ul>

</div>

    <div class="card">
        <h1>🚗 Smart IoT Monitoring System</h1>
        <p>Real-Time Sensor Monitoring Platform</p>

        <p>Temperature: <span id="temperature">--</span> °C</p>
        <p>Humidity: <span id="humidity">--</span> %</p>
        <p>Distance: <span id="distance">--</span> cm</p>
        <p>Status: <span id="status">--</span></p>
    </div>

    <canvas id="temperatureChart" width="400" height="200"></canvas>
    <canvas id="distanceChart" width="400" height="200"></canvas>

    <script>
        const temperatureCtx = document.getElementById('temperatureChart');

        const temperatureChart = new Chart(temperatureCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperature',
                    data: [],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: false
            }
        });

        const distanceCtx = document.getElementById('distanceChart');

        const distanceChart = new Chart(distanceCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Distance',
                    data: [],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: false
            }
        });

        function fetchData() {
            const data = {
                temperature: (20 + Math.random() * 15).toFixed(2),
                humidity: (40 + Math.random() * 40).toFixed(2),
                distance: (5 + Math.random() * 95).toFixed(2)
            };

            if (data.distance < 20) {
                data.status = "warning";
            } else {
                data.status = "safe";
            }

            document.getElementById("temperature").innerText = data.temperature;
            document.getElementById("humidity").innerText = data.humidity;
            document.getElementById("distance").innerText = data.distance;

            const statusElement = document.getElementById("status");
            const card = document.querySelector(".card");

            statusElement.innerText = data.status;

            if (data.status === "warning") {
                statusElement.className = "warning";
                card.style.border = "3px solid red";
            } else {
                statusElement.className = "safe";
                card.style.border = "none";
            }

            const now = new Date().toLocaleTimeString();

            temperatureChart.data.labels.push(now);
            temperatureChart.data.datasets[0].data.push(data.temperature);

            distanceChart.data.labels.push(now);
            distanceChart.data.datasets[0].data.push(data.distance);

            if (temperatureChart.data.labels.length > 10) {
                temperatureChart.data.labels.shift();
                temperatureChart.data.datasets[0].data.shift();

                distanceChart.data.labels.shift();
                distanceChart.data.datasets[0].data.shift();
            }

            temperatureChart.update();
            distanceChart.update();
        }

        fetchData();
        setInterval(fetchData, 2000);
    </script>

</body>

</html>
