<!DOCTYPE html>
<html>

<head>
    <title>IoT Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .warning {
            color: #ff4d4d;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .safe {
            color: green;
            font-weight: bold;
        }

        canvas {
            margin-top: 30px;
        }

        @keyframes blink {

            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>🚗 IoT Monitoring Dashboard</h1>

        <p>Temperature:
            <span id="temperature">--</span> °C
        </p>

        <p>Humidity:
            <span id="humidity">--</span> %
        </p>

        <p>Distance:
            <span id="distance">--</span> cm
        </p>

        <p>Status:
            <span id="status">--</span>
        </p>

    </div>

    <canvas id="temperatureChart" width="400" height="200">
    <canvas id="distanceChart" width="400" height="200"></canvas>

    <script>

        const ctx = document.getElementById('temperatureChart');

        const distanceCtx = document.getElementById('distanceChart');

        const distanceChart = new Chart(distanceCtx, {

            type: 'line',

            data: {

                labels: [],

                datasets: [{

                    label: 'Distance',

                    data: [],

                    borderWidth: 2
                }]
            },
        
    options: {

        responsive: false
    }
});
        function fetchData() {

    const data = {

        temperature: (20 + Math.random() * 15).toFixed(2),

        humidity: (40 + Math.random() * 40).toFixed(2),

        distance: (5 + Math.random() * 95).toFixed(2)
    };

    if (data.distance < 20) {
        data.status = "warning";
    } else {
        data.status = "safe";
    }

    document.getElementById("temperature").innerText =
        data.temperature;

    document.getElementById("humidity").innerText =
        data.humidity;

    document.getElementById("distance").innerText =
        data.distance;

    const statusElement =
        document.getElementById("status");

    const card =
        document.querySelector(".card");

    statusElement.innerText = data.status;

    if (data.status === "warning") {

        statusElement.className = "warning";

        card.style.border = "3px solid red";

    } else {

        statusElement.className = "safe";

        card.style.border = "none";
    }

    temperatureChart.data.labels.push(
        new Date().toLocaleTimeString()
    );

    temperatureChart.data.datasets[0].data.push(
        data.temperature
    );

    if (temperatureChart.data.labels.length > 10) {

        temperatureChart.data.labels.shift();

        temperatureChart.data.datasets[0].data.shift();
    }

    temperatureChart.update();
            distanceChart.data.labels.push(
    new Date().toLocaleTimeString()
    );

    distanceChart.data.datasets[0].data.push(
        data.distance
    );

    if (distanceChart.data.labels.length > 10) {

        distanceChart.data.labels.shift();

        distanceChart.data.datasets[0].data.shift();
    }

    distanceChart.update();
    }

    fetchData();

    setInterval(fetchData, 2000);
        </script>

</body>

</html>
